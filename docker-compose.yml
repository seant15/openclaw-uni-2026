version: '3.8'

# OpenClaw Deployment for Coolify
# Builds OpenClaw from source with your custom configs

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    
    environment:
      # Core OpenClaw settings
      HOME: /home/openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-uni-random-token}
      
      # Model API Keys (passed from Coolify env)
      KIMI_API_KEY: ${KIMI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      
      # Channel credentials
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      
      # Persistence
      OPENCLAW_CONFIG_DIR: /home/openclaw/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/openclaw/.openclaw/workspace
      
    volumes:
      # Persistent data (survives redeploys)
      - openclaw-data:/home/openclaw/.openclaw
      
      # Your tracked configs (from this repo)
      - ./config/openclaw.json:/home/openclaw/.openclaw/openclaw.json:ro
      # Per-agent mounts — active roster: clover, mary, kimi, datie (fixed 2026-04-06)
      - ./workspace/clover:/home/openclaw/.openclaw/workspace/agents/clover:ro
      - ./workspace/mary:/home/openclaw/.openclaw/workspace/agents/mary:ro
      - ./workspace/kimi:/home/openclaw/.openclaw/workspace/agents/kimi:ro
      - ./workspace/datie:/home/openclaw/.openclaw/workspace/agents/datie:ro
      - ./workspace/memory:/home/openclaw/.openclaw/workspace/memory:rw
      
      # Backup/restore scripts
      - ./scripts:/opt/openclaw/scripts:ro
      
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "9091:9091"  # OpenClaw Control Center Dashboard
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  openclaw-data:
    driver: local
    driver_opts:
      