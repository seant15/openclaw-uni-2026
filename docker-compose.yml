version: '3.8'

# OpenClaw Deployment for Coolify
# This references the official OpenClaw image with your custom configs

services:
  openclaw-gateway:
    image: openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    
    environment:
      # Core OpenClaw settings
      HOME: /home/node
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-uni-random-token}
      
      # Model API Keys (passed from Coolify env)
      KIMI_API_KEY: ${KIMI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      
      # Channel credentials
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      
      # Persistence
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      
    volumes:
      # Persistent data (survives redeploys)
      - openclaw-data:/home/node/.openclaw
      
      # Your tracked configs (from this repo)
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./workspace/agents:/home/node/.openclaw/workspace/agents:ro
      - ./workspace/memory:/home/node/.openclaw/workspace/memory:rw
      
      # Backup/restore scripts
      - ./scripts:/opt/openclaw/scripts:ro
      
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      
    healthcheck:
      test: ["CMD", "openclaw", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
      
    # Pre-start: restore from backup if exists
    entrypoint: ["/opt/openclaw/scripts/entrypoint.sh"]
    
    command: >
      node dist/index.js gateway
      --bind ${OPENCLAW_BIND:-lan}
      --port 18789

volumes:
  openclaw-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/.openclaw

networks:
  default:
    name: openclaw-network
